services:
  - type: web
    name: calorix-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: CaloriX
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./calorixx.db
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: CORS_ORIGINS
        value: '["https://your-frontend.vercel.app"]'
      - key: GEMINI_API_KEY
        sync: false
